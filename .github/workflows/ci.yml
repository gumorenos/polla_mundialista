name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          ENVIRONMENT: development
          ADMIN_TOKEN: test-token-ci
          ADMIN_PASSWORD: test-password-ci
          REDIS_URL: redis://localhost:6379/0
          SQLITE_PATH: ":memory:"
        run: |
          cd backend
          pytest -v --tb=short -x 2>&1 | tail -50

      - name: Syntax check
        run: |
          cd backend
          python -m py_compile app/main.py && echo "Syntax OK"
        continue-on-error: true

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: TypeScript check
        run: |
          cd frontend
          npm run typecheck

      - name: Run tests
        run: |
          cd frontend
          npm test -- --run

      - name: Build check
        env:
          VITE_API_URL: http://localhost:8000
        run: |
          cd frontend
          npm run build
