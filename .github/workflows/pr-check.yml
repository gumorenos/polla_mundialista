name: PR Quick Check

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Quick Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no secrets in code
        run: |
          if grep -r "sk-" --include="*.py" --include="*.ts" --include="*.tsx" backend/ frontend/src/ 2>/dev/null; then
            echo "WARNING: Possible API key found in code"
            exit 1
          fi
          echo "No secrets found"

      - name: Check .env not committed
        run: |
          if [ -f ".env" ]; then
            echo "ERROR: .env file should not be committed"
            exit 1
          fi
          echo ".env not in repo - OK"
