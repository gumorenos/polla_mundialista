services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./data/processed:/app/data/processed
      - ./data/exports:/app/data/exports
      - ./data/raw:/app/data/raw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    command:
      - rq
      - worker
      - --url
      - redis://redis:6379
      - default
      - long
      - ml
      - news
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./data/processed:/app/data/processed
      - ./data/exports:/app/data/exports
      - ./data/raw:/app/data/raw
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    command: ["python", "-m", "app.scheduler.scheduler"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./data/processed:/app/data/processed
      - ./data/exports:/app/data/exports
      - ./data/raw:/app/data/raw
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
