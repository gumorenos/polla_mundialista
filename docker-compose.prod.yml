# Production Docker Compose — Oracle Cloud Free ARM (linux/arm64)
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
# Prerequisites:
#   cp .env.example .env && vi .env   # fill real secrets

name: oraculo-prod

services:
  # -----------------------------------------------------------------------
  # Redis — internal only, no exposed port
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # -----------------------------------------------------------------------
  # Backend API
  # -----------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    platform: linux/arm64
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      SCHEDULER_ENABLED: "false"  # scheduler runs in its own service below
      DATA_RAW_PATH: /app/data/raw
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data/sqlite
      - ./data/raw:/app/data/raw:ro
      - exports_data:/app/data/exports
      - models_data:/app/data/models
      - backups_data:/app/data/backups
      - /home/ubuntu/proyectos/statsbomb-data/data:/home/ubuntu/proyectos/statsbomb-data/data:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M

  # -----------------------------------------------------------------------
  # RQ Worker (default + long + ml + news queues)
  # -----------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    platform: linux/arm64
    restart: unless-stopped
    command:
      - rq
      - worker
      - --url
      - redis://redis:6379
      - default
      - long
      - ml
      - news
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      DATA_RAW_PATH: /app/data/raw
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data/sqlite
      - ./data/raw:/app/data/raw:ro
      - exports_data:/app/data/exports
      - models_data:/app/data/models
    networks:
      - internal
    healthcheck:
      test: ["CMD", "rq", "info", "--url", "redis://redis:6379"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 3G
        reservations:
          cpus: "0.25"
          memory: 512M

  # -----------------------------------------------------------------------
  # Scheduler — APScheduler running in isolation (not in the API process)
  # -----------------------------------------------------------------------
  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    platform: linux/arm64
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.scheduler"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      SCHEDULER_ENABLED: "true"
      DATA_RAW_PATH: /app/data/raw
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data/sqlite
      - ./data/raw:/app/data/raw:ro
      - exports_data:/app/data/exports
      - models_data:/app/data/models
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "from app.core.config import settings; import redis; redis.Redis.from_url(settings.REDIS_URL).ping()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # -----------------------------------------------------------------------
  # Frontend — Nginx serving the React build
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

# ---------------------------------------------------------------------------
# Networks — Redis and workers are not reachable from outside
# ---------------------------------------------------------------------------
networks:
  internal:
    driver: bridge
    internal: false   # api and frontend need outbound internet for scraping/LLM

# ---------------------------------------------------------------------------
# Named volumes — persist data across container restarts
# ---------------------------------------------------------------------------
volumes:
  redis_data:
  sqlite_data:
  exports_data:
  models_data:
  backups_data:
